<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#E8EDF2" rx="8"/>
  <!-- Key icon -->
  <g transform="translate(200, 120)" fill="none" stroke="#1A3A5C" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Key ring (circle) -->
    <circle cx="-40" cy="0" r="28" />
    <!-- Key shaft -->
    <line x1="-12" y1="0" x2="55" y2="0" />
    <!-- Key teeth -->
    <line x1="35" y1="0" x2="35" y2="14" />
    <line x1="48" y1="0" x2="48" y2="14" />
    <!-- Small dot in circle -->
    <circle cx="-40" cy="0" r="6" fill="#1A3A5C" stroke="none" />
  </g>
  <!-- Label -->
  <text x="200" y="210" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#1A3A5C">Chave do Veículo</text>
  <!-- Subtitle -->
  <text x="200" y="238" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1A3A5C" opacity="0.6">Foto obrigatória</text>
</svg>