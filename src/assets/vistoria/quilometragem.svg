<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#E8EDF2" rx="8"/>
  <!-- Speedometer/odometer icon -->
  <g transform="translate(200, 115)">
    <!-- Outer arc (semi-circle gauge) -->
    <path d="M -55 10 A 55 55 0 1 1 55 10" fill="none" stroke="#1A3A5C" stroke-width="6" stroke-linecap="round"/>
    <!-- Tick marks -->
    <line x1="-42" y1="-34" x2="-36" y2="-29" stroke="#1A3A5C" stroke-width="4" stroke-linecap="round"/>
    <line x1="-18" y1="-52" x2="-15" y2="-44" stroke="#1A3A5C" stroke-width="4" stroke-linecap="round"/>
    <line x1="18" y1="-52" x2="15" y2="-44" stroke="#1A3A5C" stroke-width="4" stroke-linecap="round"/>
    <line x1="42" y1="-34" x2="36" y2="-29" stroke="#1A3A5C" stroke-width="4" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="7" fill="#1A3A5C"/>
    <!-- Needle pointing to ~2 o'clock -->
    <line x1="0" y1="0" x2="28" y2="-30" stroke="#1A3A5C" stroke-width="5" stroke-linecap="round"/>
    <!-- Odometer display box -->
    <rect x="-30" y="16" width="60" height="20" rx="3" fill="#1A3A5C" opacity="0.12" stroke="#1A3A5C" stroke-width="2"/>
    <text x="0" y="31" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#1A3A5C">045280</text>
  </g>
  <!-- Label -->
  <text x="200" y="210" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#1A3A5C">Quilometragem</text>
  <!-- Subtitle -->
  <text x="200" y="238" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1A3A5C" opacity="0.6">Foto obrigatória</text>
</svg>