<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#E8EDF2" rx="8"/>
  <!-- Chassis / car frame icon -->
  <g transform="translate(200, 115)" fill="none" stroke="#1A3A5C" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main frame rail -->
    <line x1="-70" y1="0" x2="70" y2="0" />
    <!-- Front axle -->
    <line x1="-50" y1="-18" x2="-50" y2="18" />
    <!-- Rear axle -->
    <line x1="50" y1="-18" x2="50" y2="18" />
    <!-- Front wheels -->
    <circle cx="-50" cy="-24" r="12" stroke-width="5" />
    <circle cx="-50" cy="24" r="12" stroke-width="5" />
    <!-- Rear wheels -->
    <circle cx="50" cy="-24" r="12" stroke-width="5" />
    <circle cx="50" cy="24" r="12" stroke-width="5" />
    <!-- Cross members -->
    <line x1="-25" y1="-10" x2="-25" y2="10" />
    <line x1="0" y1="-10" x2="0" y2="10" />
    <line x1="25" y1="-10" x2="25" y2="10" />
    <!-- VIN plate hint -->
    <rect x="-18" y="-50" width="36" height="16" rx="2" fill="#1A3A5C" opacity="0.15" stroke="#1A3A5C" stroke-width="3"/>
    <line x1="-12" y1="-44" x2="12" y2="-44" stroke-width="2" opacity="0.5"/>
    <line x1="-12" y1="-40" x2="8" y2="-40" stroke-width="2" opacity="0.5"/>
  </g>
  <!-- Label -->
  <text x="200" y="210" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#1A3A5C">Chassi</text>
  <!-- Subtitle -->
  <text x="200" y="238" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#1A3A5C" opacity="0.6">Foto obrigatória</text>
</svg>